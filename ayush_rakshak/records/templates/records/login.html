{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ayush Rakshak</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #e2e8f0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .curved-wrapper {
           background-color: #ffffff;
           border-radius: 30px; /* Ye borders ko mast curve karega */
           overflow: hidden; /* Sabse zaroori: Iske bina background image kone (corners) se bahar nikal aayegi */
           box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); /* Premium 3D shadow */
           width: 100%;
           max-width: 1400px; /* Badi screen pe isse zyada nahi failega */
           height: 90vh; /* Screen ka 90% height lega */
         }

        .form-control {
            border-radius: 8px;
            padding: 12px 16px;
            border: 1px solid #e5e7eb;
            font-size: 0.95rem;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #2563eb;
        }

        .btn-primary-custom {
            background-color: #2563eb;
            color: white;
            border-radius: 50px;
            padding: 12px;
            font-weight: 500;
        }

        .btn-primary-custom:hover {
            background-color: #1d4ed8;
            color: white;
        }

        .btn-google {
            border: 1px solid #e5e7eb;
            border-radius: 50px;
            padding: 12px;
            font-weight: 500;
            background-color: white;
            color: #374151;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn-google:hover {
            background-color: #f9fafb;
        }

        .category-text {
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #111827;
            text-transform: titlecase;
        }

        .right-side-bg {
            /* YAHAN APNI IMAGE KA LINK DAALNA */
            background-image: url('{% static "records/firstimg.png" %}');
            background-color: #eef2f6;
            /* Fallback color */
            background-size: cover;
            background-position: center;
        }
        .container-fluid {
            padding: 20px;
        }


    </style>
</head>

<body>
    <div class="curved-wrapper">
    <div class="container-fluid h-100 p-0">
        <div class="row g-0 h-100 p-2 p-md-3">
            <div class="col-lg-6 d-flex align-items-center justify-content-center bg-white p-4 ">
                <div style="max-width: 420px; width: 100%;">

                    <p class="category-text mb-2" style="color: #1d4ed8; text-align: center;">iVault </p>
                    <hr>
                    <h1 class="fw-bold mb-2" style="font-size: 2.2rem; color: #111827;">Sign in to your account</h1>
                    <p class="text-muted mb-4" style="font-size: 0.95rem;">Enter your credentials to view all insights
                    </p>

                    {% if error %}
                    <div class="alert alert-danger p-2 text-center rounded-3" role="alert" style="font-size: 0.9rem;">
                        {{ error }}
                    </div>
                    {% endif %}

                    <form method="POST" action="">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-medium text-dark" style="font-size: 0.9rem;">Email
                                address</label>
                            <input type="email" class="form-control" name="email" required
                                placeholder="Enter your email address">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-medium text-dark" style="font-size: 0.9rem;">Password</label>
                            <input type="password" class="form-control" name="password" required
                                placeholder="Enter your password">
                        </div>

                        <button type="submit"
                            class="btn btn-primary-custom w-100 mb-3 d-flex justify-content-center align-items-center gap-2">
                            Submit <span>&rarr;</span>
                        </button>
                    </form>

                    <a href="#" class="btn btn-google w-100 mb-4">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg"
                            alt="Google" width="18">
                        Sign in with Google
                    </a>

                    <div class="text-center mt-2">
                        <small class="text-muted">Don't have an account? <a href="{% url 'register_step1' %}"
                                class="text-decoration-none fw-medium" style="color: #2563eb;">Register here</a></small>
                    </div>
                </div>
            </div>

            <div class="col-lg-6 d-none d-lg-block p-2">
                <div class="w-100 h-100 rounded-4 right-side-bg"></div>
            </div>
        </div>
    </div>
    </div>
    </div>
</body>

</html>
